<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="card-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />

  <rect x="40" y="30" width="1120" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="600" y="68" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">IndustrialGPT – End-to-End System Architecture</text>

  <!-- Presentation Layer -->
  <rect x="40" y="120" width="340" height="630" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
  <rect x="55" y="135" width="310" height="40" rx="6" fill="url(#card-blue)" />
  <text x="210" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Frontend Presentation (React 19)</text>

  <!-- Application Backend -->
  <rect x="440" y="120" width="340" height="630" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)" />
  <rect x="455" y="135" width="310" height="40" rx="6" fill="#0f766e" />
  <text x="610" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Application Backend (FastAPI Services)</text>

  <!-- Data Storage -->
  <rect x="840" y="120" width="320" height="630" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#shadow)" />
  <rect x="855" y="135" width="290" height="40" rx="6" fill="#6b21a8" />
  <text x="1000" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Data Persistence &amp; Storage</text>
</svg>
