<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="card-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="card-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="card-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#581c87" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="card-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" />

  <!-- Title Banner -->
  <rect x="40" y="30" width="1120" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="600" y="68" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">IndustrialGPT – End-to-End System Architecture</text>

  <!-- Layer 1: Presentation Layer (Frontend) -->
  <rect x="40" y="120" width="340" height="630" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
  <rect x="55" y="135" width="310" height="40" rx="6" fill="url(#card-blue)" />
  <text x="210" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Frontend Presentation (React 19)</text>

  <g transform="translate(60, 200)">
    <rect width="290" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="145" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Unified Operations Dashboard</text>
    <text x="145" y="50" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Asset Telemetry • KPIs • Health Radar</text>

    <rect y="75" width="290" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="145" y="110" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">RAG AI Industrial Chat Assistant</text>
    <text x="145" y="125" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">SOP Grounded Q&amp;A • Citations</text>

    <rect y="150" width="290" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="145" y="185" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Document Processing &amp; OCR Ingestion</text>
    <text x="145" y="200" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">PDF/Image Parser • Metadata Tagging</text>

    <rect y="225" width="290" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="145" y="260" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2D/3D Knowledge Graph Explorer</text>
    <text x="145" y="275" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Cypher Query Workbench • Topology</text>

    <rect y="300" width="290" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="145" y="335" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Predictive Maintenance &amp; RUL</text>
    <text x="145" y="350" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Vibration • Temp • Oil Quality Telemetry</text>

    <rect y="375" width="290" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <text x="145" y="410" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">System Settings &amp; Security RBAC</text>
    <text x="145" y="425" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Audit Logs • JWT Session Management</text>
  </g>

  <!-- Connectors Frontend to Gateway -->
  <line x1="380" y1="435" x2="430" y2="435" stroke="#3b82f6" stroke-width="3" stroke-dasharray="6,6" />
  <polygon points="430,430 440,435 430,440" fill="#3b82f6" />

  <!-- Layer 2: API Gateway & Application Layer (FastAPI Backend) -->
  <rect x="440" y="120" width="340" height="630" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)" />
  <rect x="455" y="135" width="310" height="40" rx="6" fill="url(#card-teal)" />
  <text x="610" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Application Backend (FastAPI Services)</text>

  <g transform="translate(460, 200)">
    <rect width="290" height="55" rx="8" fill="#334155" stroke="#0d9488" stroke-width="1.5" />
    <text x="145" y="32" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">API Router &amp; OpenAPI Spec</text>
    <text x="145" y="46" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">REST Endpoint Routing • Request Validation</text>

    <rect y="70" width="290" height="55" rx="8" fill="#334155" stroke="#0d9488" stroke-width="1.5" />
    <text x="145" y="102" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Auth &amp; Security Middleware</text>
    <text x="145" y="116" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">JWT Verification • CORS • Structlog Logger</text>

    <rect y="140" width="290" height="55" rx="8" fill="#334155" stroke="#0d9488" stroke-width="1.5" />
    <text x="145" y="172" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">RAG &amp; Embedding Engine</text>
    <text x="145" y="186" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">SentenceTransformers • Hybrid Vector Search</text>

    <rect y="210" width="290" height="55" rx="8" fill="#334155" stroke="#0d9488" stroke-width="1.5" />
    <text x="145" y="242" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Knowledge Graph Cypher Service</text>
    <text x="145" y="256" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Neo4j Async Driver • Ontology Resolver</text>

    <rect y="280" width="290" height="55" rx="8" fill="#334155" stroke="#0d9488" stroke-width="1.5" />
    <text x="145" y="312" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Predictive Maintenance Engine</text>
    <text x="145" y="326" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">RUL Heuristic Model • Anomaly Detection</text>

    <rect y="350" width="290" height="55" rx="8" fill="#334155" stroke="#0d9488" stroke-width="1.5" />
    <text x="145" y="382" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Asynchronous Celery Worker Task Queue</text>
    <text x="145" y="396" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Background OCR • Vector Indexing</text>
  </g>

  <!-- Connectors Backend to Databases -->
  <line x1="780" y1="435" x2="830" y2="435" stroke="#14b8a6" stroke-width="3" stroke-dasharray="6,6" />
  <polygon points="830,430 840,435 830,440" fill="#14b8a6" />

  <!-- Layer 3: Persistence & AI Storage Layer -->
  <rect x="840" y="120" width="320" height="630" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#shadow)" />
  <rect x="855" y="135" width="290" height="40" rx="6" fill="url(#card-purple)" />
  <text x="1000" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Data Persistence &amp; Storage</text>

  <g transform="translate(860, 200)">
    <rect width="270" height="90" rx="8" fill="#334155" stroke="#9333ea" stroke-width="1.5" />
    <text x="135" y="35" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">PostgreSQL Database</text>
    <text x="135" y="55" fill="#c084fc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SQLAlchemy 2.x Async ORM</text>
    <text x="135" y="73" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Users, Docs, Assets, Logs, Sessions</text>

    <rect y="110" width="270" height="90" rx="8" fill="#334155" stroke="#9333ea" stroke-width="1.5" />
    <text x="135" y="145" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">ChromaDB Vector Store</text>
    <text x="135" y="165" fill="#c084fc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Cosine Similarity Indexing</text>
    <text x="135" y="183" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">384/1536d Document Embeddings</text>

    <rect y="220" width="270" height="90" rx="8" fill="#334155" stroke="#9333ea" stroke-width="1.5" />
    <text x="135" y="255" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Neo4j Graph Database</text>
    <text x="135" y="275" fill="#c084fc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Cypher Query Engine</text>
    <text x="135" y="293" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Plant Assets, Sensors, SOP Links</text>

    <rect y="330" width="270" height="90" rx="8" fill="#334155" stroke="#9333ea" stroke-width="1.5" />
    <text x="135" y="365" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Redis Cache &amp; Broker</text>
    <text x="135" y="385" fill="#c084fc" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Celery Message Broker</text>
    <text x="135" y="403" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">JWT Revocation, Task Queues</text>
  </g>
</svg>
