<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="1000" height="600" fill="url(#bg)" />

  <rect x="40" y="25" width="920" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="60" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">IndustrialGPT – JWT Authentication &amp; RBAC Flow</text>

  <!-- Lifeline Headers -->
  <rect x="80" y="110" width="160" height="45" rx="6" fill="#3b82f6" />
  <text x="160" y="138" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Client (React 19)</text>

  <rect x="420" y="110" width="160" height="45" rx="6" fill="#14b8a6" />
  <text x="500" y="138" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FastAPI Backend</text>

  <rect x="760" y="110" width="160" height="45" rx="6" fill="#a855f7" />
  <text x="840" y="138" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PostgreSQL / DB</text>

  <!-- Lifeline dashed lines -->
  <line x1="160" y1="155" x2="160" y2="550" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="500" y1="155" x2="500" y2="550" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="840" y1="155" x2="840" y2="550" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Step 1: Login Request -->
  <line x1="160" y1="200" x2="500" y2="200" stroke="#60a5fa" stroke-width="2" />
  <polygon points="490,195 500,200 490,205" fill="#60a5fa" />
  <text x="330" y="190" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">POST /api/v1/auth/login (email, password)</text>

  <!-- Step 2: DB Lookup -->
  <line x1="500" y1="240" x2="840" y2="240" stroke="#2dd4bf" stroke-width="2" />
  <polygon points="830,235 840,240 830,245" fill="#2dd4bf" />
  <text x="670" y="230" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SELECT user &amp; roles</text>

  <!-- Step 3: DB Response -->
  <line x1="840" y1="280" x2="500" y2="280" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="4,4" />
  <polygon points="510,275 500,280 510,285" fill="#2dd4bf" />
  <text x="670" y="270" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Return user_record (hashed_pass, roles)</text>

  <!-- Step 4: Token Generation & Response -->
  <line x1="500" y1="330" x2="160" y2="330" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,4" />
  <polygon points="170,325 160,330 170,335" fill="#60a5fa" />
  <text x="330" y="320" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Return { access_token (JWT), refresh_token }</text>

  <!-- Step 5: Authenticated API Request -->
  <line x1="160" y1="410" x2="500" y2="410" stroke="#a7f3d0" stroke-width="2" />
  <polygon points="490,405 500,410 490,415" fill="#a7f3d0" />
  <text x="330" y="400" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">GET /api/v1/documents (Header: Bearer JWT)</text>

  <!-- Step 6: Middleware Verification -->
  <rect x="440" y="440" width="120" height="40" rx="6" fill="#334155" stroke="#34d399" stroke-width="1.5" />
  <text x="500" y="465" fill="#34d399" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Verify Signature &amp; RBAC</text>

  <!-- Step 7: Authorized Response -->
  <line x1="500" y1="510" x2="160" y2="510" stroke="#a7f3d0" stroke-width="2" stroke-dasharray="4,4" />
  <polygon points="170,505 160,510 170,515" fill="#a7f3d0" />
  <text x="330" y="500" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Return Protected Resource Data (200 OK)</text>
</svg>
