<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="1000" height="650" fill="url(#bg)" />

  <rect x="40" y="25" width="920" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="60" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">IndustrialGPT – Docker Compose Container Topology</text>

  <!-- Nginx Reverse Proxy Container -->
  <g transform="translate(60, 110)">
    <rect width="880" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
    <rect width="880" height="30" rx="8" fill="#2563eb" />
    <text x="440" y="20" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Nginx Reverse Proxy Container (Port 80 / 443 SSL)</text>
    <text x="440" y="58" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Routes / to React Frontend &amp; /api/ to FastAPI Backend • SSL Termination • Gzip Compression</text>
  </g>

  <line x1="280" y1="190" x2="280" y2="240" stroke="#3b82f6" stroke-width="2" />
  <line x1="720" y1="190" x2="720" y2="240" stroke="#3b82f6" stroke-width="2" />

  <!-- Container 1: Frontend -->
  <g transform="translate(60, 240)">
    <rect width="420" height="150" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)" />
    <rect width="420" height="35" rx="8" fill="#1d4ed8" />
    <text x="210" y="23" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">frontend (Vite / React 19 SPA Container)</text>
    <text x="20" y="65" fill="#f8fafc" font-family="monospace" font-size="11">Container Name: industrialgpt-frontend</text>
    <text x="20" y="85" fill="#f8fafc" font-family="monospace" font-size="11">Port Mapping: 3000:80</text>
    <text x="20" y="105" fill="#94a3b8" font-family="monospace" font-size="11">Build: Multi-stage Dockerfile Node 20 -&gt; Nginx</text>
  </g>

  <!-- Container 2: Backend -->
  <g transform="translate(520, 240)">
    <rect width="420" height="150" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)" />
    <rect width="420" height="35" rx="8" fill="#0f766e" />
    <text x="210" y="23" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">backend (FastAPI Service Container)</text>
    <text x="20" y="65" fill="#f8fafc" font-family="monospace" font-size="11">Container Name: industrialgpt-backend</text>
    <text x="20" y="85" fill="#f8fafc" font-family="monospace" font-size="11">Port Mapping: 8000:8000 (Uvicorn Async Workers)</text>
    <text x="20" y="105" fill="#94a3b8" font-family="monospace" font-size="11">Build: Python 3.11-slim + PyMuPDF / LangChain</text>
  </g>

  <line x1="730" y1="390" x2="730" y2="440" stroke="#14b8a6" stroke-width="2" />

  <!-- Data Infrastructure Layer -->
  <g transform="translate(60, 440)">
    <rect width="880" height="180" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2" filter="url(#shadow)" />
    <rect width="880" height="35" rx="8" fill="#6b21a8" />
    <text x="440" y="23" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Database &amp; Async Infrastructure Services</text>

    <!-- Postgres -->
    <rect x="20" y="50" width="190" height="110" rx="6" fill="#334155" />
    <text x="115" y="75" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">postgres:16</text>
    <text x="115" y="98" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">Port: 5432</text>
    <text x="115" y="115" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Vol: pgdata</text>

    <!-- Neo4j -->
    <rect x="230" y="50" width="190" height="110" rx="6" fill="#334155" />
    <text x="325" y="75" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">neo4j:5-community</text>
    <text x="325" y="98" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">Port: 7474 / 7687</text>
    <text x="325" y="115" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Vol: neo4j_data</text>

    <!-- ChromaDB -->
    <rect x="440" y="50" width="190" height="110" rx="6" fill="#334155" />
    <text x="535" y="75" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">chromadb:0.4.24</text>
    <text x="535" y="98" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">Port: 8000 internal</text>
    <text x="535" y="115" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Vol: chroma_data</text>

    <!-- Redis -->
    <rect x="650" y="50" width="210" height="110" rx="6" fill="#334155" />
    <text x="755" y="75" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">redis:7-alpine / Celery</text>
    <text x="755" y="98" fill="#c084fc" font-family="monospace" font-size="10" text-anchor="middle">Port: 6379</text>
    <text x="755" y="115" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Vol: redis_data</text>
  </g>
</svg>
