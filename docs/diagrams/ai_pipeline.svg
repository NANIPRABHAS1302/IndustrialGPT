<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="step" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="1100" height="650" fill="url(#bg)" />

  <rect x="40" y="25" width="1020" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)" />
  <text x="550" y="60" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">IndustrialGPT – RAG &amp; AI Document Ingestion Pipeline</text>

  <!-- Node 1 -->
  <g transform="translate(60, 120)">
    <rect width="200" height="180" rx="10" fill="url(#step)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
    <circle cx="100" cy="45" r="22" fill="#3b82f6" />
    <text x="100" y="52" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1</text>
    <text x="100" y="95" fill="#f8fafc" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Document Upload</text>
    <text x="100" y="120" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SOP Manuals, PDFs,</text>
    <text x="100" y="138" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Images, Schematics</text>
    <text x="100" y="160" fill="#60a5fa" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Multipart REST API</text>
  </g>

  <line x1="260" y1="210" x2="310" y2="210" stroke="#3b82f6" stroke-width="3" />
  <polygon points="310,205 320,210 310,215" fill="#3b82f6" />

  <!-- Node 2 -->
  <g transform="translate(320, 120)">
    <rect width="200" height="180" rx="10" fill="url(#step)" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)" />
    <circle cx="100" cy="45" r="22" fill="#14b8a6" />
    <text x="100" y="52" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">2</text>
    <text x="100" y="95" fill="#f8fafc" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">OCR &amp; Text Parsing</text>
    <text x="100" y="120" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Tesseract / PaddleOCR</text>
    <text x="100" y="138" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Layout Extraction</text>
    <text x="100" y="160" fill="#2dd4bf" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Celery Async Task</text>
  </g>

  <line x1="520" y1="210" x2="570" y2="210" stroke="#14b8a6" stroke-width="3" />
  <polygon points="570,205 580,210 570,215" fill="#14b8a6" />

  <!-- Node 3 -->
  <g transform="translate(580, 120)">
    <rect width="200" height="180" rx="10" fill="url(#step)" stroke="#a855f7" stroke-width="2" filter="url(#shadow)" />
    <circle cx="100" cy="45" r="22" fill="#a855f7" />
    <text x="100" y="52" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">3</text>
    <text x="100" y="95" fill="#f8fafc" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Chunking &amp; Vectoring</text>
    <text x="100" y="120" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Recursive Text Splitter</text>
    <text x="100" y="138" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">SentenceTransformers</text>
    <text x="100" y="160" fill="#c084fc" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">512-token Chunks</text>
  </g>

  <line x1="780" y1="210" x2="830" y2="210" stroke="#a855f7" stroke-width="3" />
  <polygon points="830,205 840,210 830,215" fill="#a855f7" />

  <!-- Node 4 -->
  <g transform="translate(840, 120)">
    <rect width="200" height="180" rx="10" fill="url(#step)" stroke="#eab308" stroke-width="2" filter="url(#shadow)" />
    <circle cx="100" cy="45" r="22" fill="#eab308" />
    <text x="100" y="52" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">4</text>
    <text x="100" y="95" fill="#f8fafc" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">ChromaDB Store</text>
    <text x="100" y="120" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Cosine Similarity Index</text>
    <text x="100" y="138" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Metadata Injection</text>
    <text x="100" y="160" fill="#fde047" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Persistent Vector DB</text>
  </g>

  <!-- Query Phase -->
  <rect x="40" y="340" width="1020" height="260" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)" />
  <text x="550" y="375" fill="#38bdf8" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Interactive Hybrid RAG Retrieval &amp; Generation Flow</text>

  <g transform="translate(70, 400)">
    <rect width="200" height="160" rx="8" fill="#334155" />
    <text x="100" y="40" fill="#f8fafc" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">User Natural Query</text>
    <text x="100" y="70" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">"How do I clear fault</text>
    <text x="100" y="88" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">code E-401 on Pump 3?"</text>
  </g>

  <line x1="270" y1="480" x2="330" y2="480" stroke="#38bdf8" stroke-width="3" />
  <polygon points="330,475 340,480 330,485" fill="#38bdf8" />

  <g transform="translate(340, 400)">
    <rect width="220" height="160" rx="8" fill="#334155" />
    <text x="110" y="35" fill="#f8fafc" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Hybrid Search</text>
    <text x="110" y="65" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Vector Cosine Search</text>
    <text x="110" y="85" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">+ Neo4j Cypher Context</text>
    <text x="110" y="115" fill="#38bdf8" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Top-K Context Chunks</text>
  </g>

  <line x1="560" y1="480" x2="620" y2="480" stroke="#38bdf8" stroke-width="3" />
  <polygon points="620,475 630,480 620,485" fill="#38bdf8" />

  <g transform="translate(630, 400)">
    <rect width="220" height="160" rx="8" fill="#334155" />
    <text x="110" y="35" fill="#f8fafc" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Context-Grounded LLM</text>
    <text x="110" y="65" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">GPT-4o / Local LLM</text>
    <text x="110" y="85" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Strict SOP Prompting</text>
    <text x="110" y="115" fill="#38bdf8" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Zero Hallucination</text>
  </g>

  <line x1="850" y1="480" x2="900" y2="480" stroke="#38bdf8" stroke-width="3" />
  <polygon points="900,475 910,480 900,485" fill="#38bdf8" />

  <g transform="translate(910, 400)">
    <rect width="130" height="160" rx="8" fill="url(#highlight)" />
    <text x="65" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Verified</text>
    <text x="65" y="65" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Response</text>
    <text x="65" y="100" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step-by-Step</text>
    <text x="65" y="118" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">+ Citations</text>
  </g>
</svg>
