version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrial_gpt_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - NEO4J_URI=bolt://neo4j:7687
      - CHROMADB_HOST=chromadb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_started
      chromadb:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: industrial_gpt_postgres
    restart: always
    environment:
      POSTGRES_USER: industrial_admin
      POSTGRES_PASSWORD: industrial_password_2026
      POSTGRES_DB: industrial_gpt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U industrial_admin -d industrial_gpt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: industrial_gpt_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: industrial_gpt_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: industrial_gpt_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/industrial_neo4j_password
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: industrial_gpt_chromadb
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma

volumes:
  postgres_data:
  neo4j_data:
  chromadb_data:
